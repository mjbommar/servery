name: Publish to PyPI

# Publishes on a version tag (vX.Y.Z), or manually via the Actions tab. Uses
# PyPI Trusted Publishing (OIDC): no API token is ever stored — the publish job
# mints a short-lived token scoped to this repo + the `pypi` environment.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # No build cache in the publish path: a poisoned cache could taint the
      # released artifacts (zizmor cache-poisoning). Releases build clean.
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: false
      - run: uv build
      - name: Enforce zero runtime dependencies
        run: uv run python scripts/check_zero_deps.py
      - name: Validate distribution metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  bundle:
    name: Single-file bundle + GitHub release
    needs: build # only publish the bundle once the dists build + verify clean
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload servery.py / servery.pyz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: false
      - name: Build single-file artifacts
        run: |
          mkdir -p dist
          uv run python scripts/amalgamate.py > dist/servery.py
          uv run python -m zipapp src -m "servery.cli:main" -o dist/servery.pyz -p "/usr/bin/env python3"
      - name: Smoke-test the bundle (no network)
        run: |
          want="servery $(uv run python -c 'from servery._version import __version__; print(__version__)')"
          got="$(python3 dist/servery.py --version)"
          test "$got" = "$want" || { echo "servery.py --version: '$got' != '$want'"; exit 1; }
          python3 dist/servery.pyz --version
      - name: Create / update the GitHub release with the bundle
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo '## Run without installing — one file, straight from a pipe'
            echo
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/servery.py | python3 - ./public -p 8000"
            echo '```'
            echo
            echo "Pin a version with \`.../download/${TAG}/servery.py\`, or grab \`servery.pyz\` and run \`python3 servery.pyz ./public\`. Or \`pip install servery\`."
            echo
            echo "Both single-file artifacts are pure stdlib (zero runtime dependencies). Full notes: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/CHANGELOG.md)."
          } > /tmp/notes.md
          gh release create "$TAG" --title "servery ${TAG#v}" --notes-file /tmp/notes.md \
              dist/servery.py dist/servery.pyz \
            || gh release upload "$TAG" dist/servery.py dist/servery.pyz --clobber

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/servery
    permissions:
      id-token: write # OIDC token for Trusted Publishing — the only privilege needed
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
