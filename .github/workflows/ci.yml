name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; jobs opt into more if needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .

  type:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # httpx and qrcode are dev-only test dependencies (interop client + QR
      # oracle); give ty access to them in its isolated env so it resolves and
      # type-checks that test code (matching the `test` dependency group).
      - run: uvx --with "httpx[http2]" --with qrcode ty check src tests

  security:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv run bandit -c pyproject.toml -r src

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    needs: [lint, type, security]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv run --no-default-groups --group test --python ${{ matrix.python }} coverage run -m unittest discover -s tests -v
      # The 90% threshold is enforced on the canonical platform only: POSIX-only code
      # (e.g. the ctypes/OpenSSL path in _oscrypto) and OS-specific tests make per-OS
      # coverage uneven, but the full suite still RUNS (above) on every OS.
      - name: Coverage threshold (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv run --no-default-groups --group test --python ${{ matrix.python }} coverage report

  test-freethreaded:
    name: Test free-threaded (py${{ matrix.python }})
    needs: [lint, type, security]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13t", "3.14t"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      # PYTHON_GIL=0 ensures the GIL stays disabled so concurrency is exercised.
      # --no-default-groups --group test avoids the publish tooling (cffi has no free-threaded build).
      - run: PYTHON_GIL=0 uv run --no-default-groups --group test --python ${{ matrix.python }} python -m unittest discover -s tests -v

  test-experimental:
    name: Test (py${{ matrix.python }}, allowed to fail)
    needs: [lint, type, security]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.15", "3.15t"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv run --no-default-groups --group test --python ${{ matrix.python }} python -m unittest discover -s tests -v

  build:
    name: Build & zero-dependency gate
    needs: [lint, type, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv build
      - name: Enforce zero runtime dependencies
        run: uv run python scripts/check_zero_deps.py
      - name: Validate distribution metadata
        run: uvx twine check dist/*
