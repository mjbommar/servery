site_name: servery
site_description: >-
  A zero-dependency, batteries-included pure-Python HTTP file server —
  a better `python -m http.server`.
site_url: https://mjbommar.github.io/servery/
repo_url: https://github.com/mjbommar/servery
repo_name: mjbommar/servery
edit_uri: edit/main/docs/
copyright: MIT licensed · pure Python standard library

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  # Render :material-*: / :octicons-*: / :fontawesome-*: shortcodes as inline SVG
  # icons (used in the home-page feature cards).
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Existing design/contributor docs live under docs/ but aren't all in the nav;
# don't fail the build on the ones we link to contextually instead.
validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guide:
      - Serving files: guide/serving.md
      - Uploads & authentication: guide/uploads.md
      - HTTPS & certificates: guide/https.md
      - Sharing on a LAN: guide/lan.md
      - WebDAV (mount as a drive): guide/webdav.md
      - Compression, caching & headers: guide/web.md
      - HTTP/2, HTTP/3 & concurrency: guide/protocols.md
  - Recipes: recipes.md
  - Extending:
      - Using servery as a library: extending/library.md
      - Running apps & proxying: extending/apps.md
  - Reference:
      - CLI reference: reference/cli.md
  - Project:
      - Vision & goals: VISION.md
      - Principles: PRINCIPLES.md
      - Architecture: ARCHITECTURE.md
      - Transports (HTTP/1.1 → 2 → 3): TRANSPORTS.md
      - Standards (RFC compliance): STANDARDS.md
      - Dynamic handlers (WSGI/CGI/ASGI): DYNAMIC.md
      - Roadmap: ROADMAP.md
      - References & prior art: REFERENCES.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mjbommar/servery
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/servery/
